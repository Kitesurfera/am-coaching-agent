name: Generar Informe Mensual

on:
  workflow_dispatch:
    inputs:
      athlete_id:
        description: 'ID del Atleta'
        required: true

# ESTO ES VITAL: Permite al agente escribir el archivo en tu repo
permissions:
  contents: write

jobs:
  generar-cronica:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: |
          npm install @google/generative-ai
          npm install

      - name: Ejecutar Agente Cronista
        run: node generate-report.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ATHLETE_ID: ${{ github.event.inputs.athlete_id }}
          RENDER_URL: ${{ secrets.RENDER_URL }}
          TRAINER_TOKEN: ${{ secrets.TRAINER_TOKEN }}

      - name: Publicar informe en el repo
        run: |
          git config --global user.name "Agente Cronista"
          git config --global user.email "agente@andre-molli.com"
          git add informe-whatsapp.txt
          git commit -m "Nuevo informe generado para el atleta ${{ github.event.inputs.athlete_id }}" || echo "Sin cambios"
          git push
