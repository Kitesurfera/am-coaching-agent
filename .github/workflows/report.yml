name: Generar Informe Mensual
on:
  workflow_dispatch:
    inputs:
      athlete_id:
        description: 'IDs de Atletas (separados por coma)'
        required: true

permissions:
  contents: write

jobs:
  generar-cronica:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install @google/generative-ai
      - run: node generate-report.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ATHLETE_ID: ${{ github.event.inputs.athlete_id }}
          RENDER_URL: ${{ secrets.RENDER_URL }}
          TRAINER_TOKEN: ${{ secrets.TRAINER_TOKEN }}
      - name: Publicar todos los informes
        run: |
          git config --global user.name "Agente Cronista"
          git config --global user.email "agente@andre-molli.com"
          git add informe-*.txt
          git commit -m "🤖 Crónicas masivas generadas" || echo "Sin cambios"
          git pull --rebase origin main
          git push origin main
