name: Generar Carrusel IA

on:
  workflow_dispatch:
    inputs:
      tema:
        description: 'Tema del carrusel'
        required: true
        default: 'Claves del movimiento'

permissions:
  contents: write
  issues: write

jobs:
  crear-carrusel:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: npx remotion browser ensure
      - name: 🧠 IA Guion
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TEMA_CARRUSEL: ${{ github.event.inputs.tema }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node generate-carrusel.js
      - name: 🎨 Renderizar Imágenes
        run: |
          mkdir -p carrusel_out
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');
          const data = JSON.parse(fs.readFileSync('carrusel.json'));
          data.forEach((slide, i) => {
            const props = JSON.stringify({ ...slide, numero: i + 1, total: data.length });
            fs.writeFileSync('props.json', props);
            execSync('npx remotion still src/index.jsx Carrusel carrusel_out/slide_' + (i+1) + '.png --props=props.json', {stdio: 'inherit'});
          });
          "
      - run: zip -r carrusel_generado.zip carrusel_out/
      - uses: actions/upload-artifact@v4
        with:
          name: Carrusel-Andre-Molli
          path: carrusel_generado.zip
