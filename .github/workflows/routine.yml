name: Asignar Rutina IA

on:
  workflow_dispatch:
    inputs:
      athlete_id:
        description: 'ID del Atleta'
        required: true
      macro_nombre:
        description: 'Nombre del Macrociclo'
        required: false
      micro_nombre:
        description: 'Nombre del Microciclo'
        required: false
      micro_id:
        description: 'ID del Microciclo (DB)'
        required: false
      dias:
        description: 'Número de días a planificar'
        required: true
        default: '1'
      foco:
        description: 'Foco técnico específico'
        required: false

permissions:
  contents: read

jobs:
  crear-y-asignar:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - run: npm install
      
      - name: 🧠 IA Coach & Inyección en DB
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RENDER_URL: "https://fit-tracker-backend-rtx2.onrender.com"
          TRAINER_TOKEN: ${{ secrets.TRAINER_TOKEN }}
          ATHLETE_ID: ${{ github.event.inputs.athlete_id }}
          MACRO_NOMBRE: ${{ github.event.inputs.macro_nombre }}
          MICRO_NOMBRE: ${{ github.event.inputs.micro_nombre }}
          MICRO_ID: ${{ github.event.inputs.micro_id }}
          DIAS: ${{ github.event.inputs.dias }}
          FOCO: ${{ github.event.inputs.foco }}
        run: node generate-routine.js
