name: Agente Planificador Semanal

on:
  workflow_dispatch:
    inputs:
      enfoque:
        description: 'Enfoque de la semana'
        required: true
        default: 'Fuerza Estructural'
  schedule:
    # Se ejecuta cada Domingo a las 20:00 (Hora UTC)
    - cron: '0 20 * * 0'

permissions:
  contents: write

jobs:
  planificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - name: 🧠 Generar Plan con Cerebro de Marca
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Si es automático (schedule), usa un enfoque por defecto
          ENFOQUE_SEMANAL: ${{ github.event.inputs.enfoque || 'Movimiento Integral' }}
        run: node generate-plan.js
      - name: 💾 Guardar y Actualizar Calendario
        run: |
          git config --global user.name "IA Strategic Planner"
          git config --global user.email "planner@andremolli.com"
          git add plan-semanal.json
          git commit -m "📅 Plan automático generado para la semana" || echo "Sin cambios"
          git push
