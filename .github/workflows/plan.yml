name: Generar Plan Semanal IA

on:
  workflow_dispatch:
    inputs:
      enfoque:
        description: 'Enfoque de la semana'
        required: true
        default: 'Estabilidad de Aterrizaje'

permissions:
  contents: write
  issues: write

jobs:
  crear-plan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - run: npm install
      - run: npx remotion browser ensure
      
      - name: 🧠 IA Estratega
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ENFOQUE_PLAN: ${{ github.event.inputs.enfoque }}
        run: node generate-plan.js

      - name: 💾 Guardar Plan en el repositorio
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add plan-semanal.json
          git commit -m "🤖 Auto-generado: Nuevo Plan Semanal" || echo "Sin cambios"
          git push

      - name: 🎨 Renderizar Póster del Plan
        run: |
          npx remotion still src/index.jsx PlanSemanal plan_generado.png --props=plan-semanal.json
          
      - uses: actions/upload-artifact@v4
        with:
          name: Plan-Semanal-Andre-Molli
          path: plan_generado.png
