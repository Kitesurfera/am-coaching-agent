name: Generar Copy y Video con IA

on:
  workflow_dispatch:
    inputs:
      archivo_media:
        description: 'Archivo (ej: entreno1.mp4)'
        required: true
        default: 'entreno1.mp4'

permissions:
  contents: write
  issues: write

jobs:
  crear-copy-y-video:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: npx remotion browser ensure
      - name: 🧠 IA Guion y Filmmaker
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          ARCHIVO_MEDIA: ${{ github.event.inputs.archivo_media }}
        run: node generate-reel.js
      - name: 🎬 Renderizar Video
        run: npx remotion render src/index.jsx MiVideo ReelAndre.mp4 --props=props.json
      - uses: actions/upload-artifact@v4
        with:
          name: Reel-Andre-Molli
          path: ReelAndre.mp4
