name: Generar Copy y Video con IA

on:
  workflow_dispatch:
    inputs:
      archivo_media:
        description: 'Archivo (ej: entreno1.mp4)'
        required: true
        default: 'entreno1.mp4'

permissions:
  contents: write
  issues: write

jobs:
  crear-copy-y-video:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install
      - run: npx remotion browser ensure
      - name: 🧠 IA Copy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node generate-copy.js
      - name: 🎬 Renderizar Video
        env:
          ARCHIVO_MEDIA: ${{ github.event.inputs.archivo_media }}
        run: >
          npx remotion render src/index.jsx MiVideo ReelAndre.mp4 --props="{\"archivo\":\"$ARCHIVO_MEDIA\"}"
      - uses: actions/upload-artifact@v4
        with:
          name: Reel-Andre-Molli
          path: ReelAndre.mp4
